<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>SemanticPortrait</title>
    <base href="/" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="SemanticPortrait.App.styles.css" />
    <link rel="icon" href="data:,">
    <link rel="preload" as="image" href="img/close.png">   <!-- farewell screen must paint instantly -->
    <link rel="preload" as="image" href="img/lockbg.png">
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <!-- boot splash: a body-level veil so the app can render UNDERNEATH it, then fade it away
         (content inside #app would die on first render — a hard cut instead of a transition) -->
    <div id="sp-boot-veil" aria-hidden="true"></div>
    <div id="app"></div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script>
        window.spScrollToBottom = (el) => { if (el) el.scrollTop = el.scrollHeight; };
        // Chat scroll memory: the chat DOM is destroyed while the constellation is open, so the
        // last position lives in JS globals. Restore puts the user back where they were — or at
        // the latest message if they were already at (or near) the bottom.
        window.spTrackScroll = (el) => {
            if (!el || el.dataset.spTracked) return;
            el.dataset.spTracked = "1";
            el.addEventListener('scroll', () => {
                window.__spChatScroll = el.scrollTop;
                window.__spChatAtBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 8;
            }, { passive: true });
        };
        // Deterministic capture at the moment of switching away (scroll events can be deferred
        // while the window is occluded, so the listener alone can miss the final position).
        window.spCaptureScroll = (el) => {
            if (!el) return;
            window.__spChatScroll = el.scrollTop;
            window.__spChatAtBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 8;
        };
        window.spRestoreScroll = (el) => {
            if (!el) return;
            el.scrollTop = (window.__spChatAtBottom === false && window.__spChatScroll != null)
                ? window.__spChatScroll : el.scrollHeight;
        };
        // Dictation lands here: write the transcript INTO the composer so the user can review
        // and edit before sending (Blazor's re-render alone can leave the textarea stale), and
        // fire input so the binding stays in sync.
        window.spSetComposer = (el, text) => {
            if (!el) return;
            el.value = text;
            el.dispatchEvent(new Event('input', { bubbles: true }));
            el.focus();
            el.selectionStart = el.selectionEnd = el.value.length;
            window.spGrowComposer(el);
        };
        // The composer grows with its content (dictation appends whole sentences at a time),
        // capped by the CSS max-height, after which it scrolls internally.
        window.spGrowComposer = (el) => {
            if (!el) return;
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 140) + 'px';
        };
        window.spWatchComposer = (el) => {
            if (!el || el.dataset.spGrow) return;
            el.dataset.spGrow = "1";
            el.addEventListener('input', () => window.spGrowComposer(el));
            window.spGrowComposer(el);
        };
        // Blazor calls this after its first paint: the splash lifts off the rendered app.
        window.spDismissBoot = () => {
            const v = document.getElementById('sp-boot-veil');
            if (!v) return;
            v.classList.add('out');
            setTimeout(() => v.remove(), 950);
        };
    </script>
    <script src="js/constellation.js"></script>
    <script src="js/sigilexport.js"></script>
    <script src="_framework/blazor.webview.js" autostart="false"></script>

</body>

</html>
